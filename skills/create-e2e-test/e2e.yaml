name: E2E - Playwright

on:
  workflow_run:
    workflows: ["CD - Build docker images on pushes to main"]
    types: [completed]
    branches: [main]
  schedule:
    - cron: "0 6 * * *" # kjør hver morgen kl 8 sommertid, 7 vintertid
  workflow_dispatch:

jobs:
  e2e:
    # hopp over dersom CD workflowen feiler, for å unngå unødvendige testkjøringer
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: workflow-runner-test
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - name: Sett forventet git SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Vent på at riktig versjon kjører i testmiljøet
        timeout-minutes: 14
        env:
          MATRIKKEL_BASE_URL: ${{ vars.MATRIKKEL_BASE_URL || 'https://ip-matrikkel.apps.ocp.test.domstol.no' }}
          EXPECTED_SHA: ${{ steps.sha.outputs.value }}
        run: |
          SHORT_SHA="${EXPECTED_SHA:0:7}"
          echo "Venter på gitSha=$SHORT_SHA i $MATRIKKEL_BASE_URL/matrikkel/version"
          until curl -sf "$MATRIKKEL_BASE_URL/matrikkel/version" | grep -q "\"gitSha\":\"$SHORT_SHA\""; do
            RUNNING=$(curl -sf "$MATRIKKEL_BASE_URL/matrikkel/version" | grep -o '"gitSha":"[^"]*"' || echo 'utilgjengelig')
            echo "Kjører nå: $RUNNING – venter 30 sekunder..."
            sleep 30
          done
          echo "Riktig versjon ($SHORT_SHA) kjører"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: src/test/e2e
        run: pnpm install

      - name: Run Playwright tests
        working-directory: src/test/e2e
        env:
          CI: "true"
          PROSJEKT: ${{ github.event.repository.name }}
          EXPECTED_SHA: ${{ steps.sha.outputs.value }}
        run: pnpm test:ci

      - name: Upload Playwright HTML report as Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v5
        with:
          path: src/test/e2e/playwright-report

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4
