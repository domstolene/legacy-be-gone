name: CD - Build docker images on pushes to main

on:
  push:
    branches: [main]

concurrency:
  group: cd-build-main-docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version-file: .java-version
          distribution: temurin
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and assemble
        env:
          # Github Workflows støtter ikke token med read:packages på organisasjonsnivå for maven-pakker,
          # derfor må vi bruke et personlig access token med tilgang til read:packages på organisasjonsnivå
          # https://docs.github.com/en/packages/learn-github-packages/about-permissions-for-github-packages#permissions-for-repository-scoped-packages
          GITHUB_TOKEN: ${{ secrets.CR_READ_PAT }}
        # Vi bruker med vilje assemble her for å få raskest mulig leveranse.
        # Testene vil kjøre på PR, som burde være tilstrekkelig for å fange opp feil i koden før det merges til main.
        run: ./gradlew assemble --no-daemon

      - name: Login to ghcr.io/domstolene
        uses: docker/login-action@v4
        with:
          registry: ghcr.io/domstolene
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build lastest docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/domstolene/${{ github.event.repository.name }}:main
