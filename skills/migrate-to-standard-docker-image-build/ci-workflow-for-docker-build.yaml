name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: maven-settings-xml-action
        uses: whelk-io/maven-settings-xml-action@v20
        with:
          servers: '[{"id": "github-lovisa_core","username": "${{github.actor}}","password": "${{secrets.CR_PAT}}"}]'
          repositories: '[{"id": "central", "url": "https://repo1.maven.org/maven2", "releases": { "enabled": "true" }}, {"id": "github-lovisa_core", "url": "https://maven.pkg.github.com/domstolene/lovisa_core"}]'

      - name: Build and test
        run: mvn --batch-mode --update-snapshots verify

      - name: Package, build jar
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: mvn package -DskipTests

      - name: Login to ghcr.io/domstolene
        uses: docker/login-action@v3
        with:
          registry: ghcr.io/domstolene
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build lastest docker image
        uses: docker/build-push-action@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          context: .
          push: true
          tags: ghcr.io/domstolene/ip-kontaktinformasjon:latest
