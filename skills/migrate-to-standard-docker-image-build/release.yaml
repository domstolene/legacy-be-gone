name: Release - Build docker images on releases

on:
  release:
    types: [published]

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version-file: .java-version
          distribution: temurin
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build, test and package
        env:
          # Github Workflows støtter ikke token med read:packages på organisasjonsnivå for maven-pakker,
          # derfor må vi bruke et personlig access token med tilgang til read:packages på organisasjonsnivå
          # https://docs.github.com/en/packages/learn-github-packages/about-permissions-for-github-packages#permissions-for-repository-scoped-packages
          GITHUB_TOKEN: ${{ secrets.CR_READ_PAT }}
        run: ./gradlew build --no-daemon -PreleaseVersion=${{ github.event.release.tag_name }}

      - name: Login to ghcr.io/domstolene
        uses: docker/login-action@v3
        with:
          registry: ghcr.io/domstolene
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build lastest docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/domstolene/${{ github.event.repository.name }}:${{ github.event.release.tag_name }}

      - name: Deploy to k8s-applications
        uses: domstolene/deploy-k8s@main
        with:
          repo_pat: ${{ secrets.REPO_PAT }}
